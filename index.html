<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weatherly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="fx-canvas"></canvas>
    <canvas id="fx-canvas-front"></canvas>
    <div class="lightning-flash" id="lightning-flash"></div>

    <div class="app">
        <div class="header">
            <div class="logo"><img src="https://bmcdn.nl/assets/weather-icons/v3.0/fill/svg/partly-cloudy-day.svg" alt=""> Weatherly</div>
            <div class="unit-toggle">
                <button class="active" onclick="setUnit('C')">°C</button>
                <button onclick="setUnit('F')">°F</button>
            </div>
        </div>

        <div class="search-container">
            <div class="search-input-wrap">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="location-input" placeholder="Search city or place..." onkeypress="handleKeyPress(event)" />
            </div>
            <button class="geo-btn" onclick="fetchGeoWeather()" title="Use my location">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
            </button>
            <button class="search-btn" onclick="fetchWeather()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
        </div>

        <div class="notification" id="error-notification"></div>

        <div id="welcome-state" class="welcome">
            <div class="welcome-icon"><img src="https://bmcdn.nl/assets/weather-icons/v3.0/fill/svg/partly-cloudy-day.svg" alt="Weather"></div>
            <h2>Welcome to Weatherly</h2>
            <p>Search for any city or use your current location to get detailed weather information.</p>
        </div>

        <div id="loading-state" class="loading">
            <div class="spinner"></div>
            <p>Fetching weather data...</p>
        </div>

        <div id="weather-content" class="weather-content">
            <div class="top-row">
                <div class="hero-card">
                    <div class="hero-location" id="w-location"></div>
                    <div class="hero-datetime" id="w-datetime"></div>
                    <div class="hero-icon" id="w-icon"></div>
                    <div class="hero-temp" id="w-temp"></div>
                    <div class="hero-feels" id="w-feels"></div>
                    <div class="hero-status" id="w-status"></div>
                    <div class="hero-minmax" id="w-minmax"></div>
                </div>
                <div class="detail-grid" id="w-details"></div>
            </div>

            <div class="mid-row">
                <div class="sun-card">
                    <div class="section-label">Sun</div>
                    <div class="sun-row">
                        <div class="sun-item">
                            <div class="sun-icon"><img src="https://bmcdn.nl/assets/weather-icons/v3.0/fill/svg/sunrise.svg" alt="Sunrise"></div>
                            <div class="sun-label">Sunrise</div>
                            <div class="sun-time" id="w-sunrise">--:--</div>
                        </div>
                        <div class="sun-divider" id="w-sun-divider"><span class="sun-marker"><img src="https://bmcdn.nl/assets/weather-icons/v3.0/fill/svg/clear-day.svg" alt="Sun"></span></div>
                        <div class="sun-item">
                            <div class="sun-icon"><img src="https://bmcdn.nl/assets/weather-icons/v3.0/fill/svg/sunset.svg" alt="Sunset"></div>
                            <div class="sun-label">Sunset</div>
                            <div class="sun-time" id="w-sunset">--:--</div>
                        </div>
                    </div>
                    <div class="sun-daylight" id="w-daylight"></div>
                </div>
                <div class="hourly-wrap">
                    <div class="section-label">Next 24 Hours</div>
                    <div class="hourly-scroll" id="w-hourly"></div>
                </div>
            </div>

            <div class="section-label">7-Day Forecast</div>
            <div class="daily-list" id="w-daily"></div>

            <div class="footer">Data from Open-Meteo &bull; Geocoding by OpenStreetMap</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
